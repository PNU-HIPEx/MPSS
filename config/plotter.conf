[FILE]
INPUT_FILE = ANALYSIS/PLA/B3S4/GAMMA_R_OOX.root
OUTPUT_PATH = PLOT/PLA/B3S4/GAMMA_R_OOX

[INCIDENT_POSITION_XY]
PATH = incident_position_xy.png
CANVAS_SIZE = 2000 1000
TITLE = "Incident position; Column; Row"
REBIN = 8 8 

# [INCIDENT_POSITION_XYZ]
# PATH = incident_position_xyz.png
# CANVAS_SIZE = 2000 2000
# TITLE = "Incident position; X [mm]; Y [mm]; Z [mm]"
# VIEW_PHI = 0
# VIEW_THETA = 90

[INCIDENT_POSITION_Z]
PATH = incident_position_z.png
CANVAS_SIZE = 2000 1000
TITLE = "Incident position Z; Z [mm]; Entry"

[DEPOSIT_POSITION_XY]
PATH = deposit_position_xy.png
CANVAS_SIZE = 2000 1000
TITLE = "Mean deposit position; Horizontal Axis [mm]; Vertical Axis [mm]; Entry"
REBIN = 8 8 
# Z_RANGE = -15 45
LEGEND_POSITION = .675 .6 .875 .9
LEGEND_FILL_COLOUR = 255 255 255
LEGEND_FILL_ALPHA = .3
MARGIN = .075 .125 .1 .1

[DEPOSIT_POSITION_SLICE]
PATH = deposit_slice_m20_20.png
CANVAS_SIZE = 2000 1000
TITLE = " Mean deposit position in -20 pix < y < 20 pix; Horizontal Axis [mm]; Entry"
# REBIN = 16
DRAW_OPTION = HISTE
LINE_COLOUR = 255 0 255
LINE_WIDTH = 2

[DEPOSIT_POSITION_SLICE_Y]
PATH = deposit_slice_y_m20_20.png
CANVAS_SIZE = 2000 1000
TITLE = " Mean deposit position in -20 pix < x < 20 pix; Vertical Axis [mm]; Entry"
# REBIN = 16
DRAW_OPTION = HISTE
LINE_COLOUR = 0 128 0
LINE_WIDTH = 2
CANVAS_FILL_COLOUR = 0 0 0
CANVAS_FILL_ALPHA = 0

[EVENT_ID]
PATH = event_id.png
CANVAS_SIZE = 3000 1000
TITLE = "EVENT ID; EVENT ID; Entry"
Y_RANGE = 0 10000

[TRACK_ID]
PATH = track_id.png
CANVAS_SIZE = 1000 1000
TITLE = "TRACK ID; TRACK ID; Entry"
LOG_Y = true

[PARENT_ID]
PATH = parent_id.png
CANVAS_SIZE = 1000 1000
TITLE = "PARENT ID; PARENT ID; Entry"
LOG_Y = true

[INCIDENT_PARTICLE]
PATH = particle.png
CANVAS_SIZE = 1000 1000
TITLE = "Particle; Particle Name; Entry"
LOG_Y = true
Y_RANGE = .9 2E+07
LABEL_SIZE = .06 .04

[DEPOSIT_PARTICLE]
PATH = deposit_particle.png
CANVAS_SIZE = 1000 1000
TITLE = "Particle; Particle Name; Entry"
LOG_Y = true
Y_RANGE = .9 2E+07
LABEL_SIZE = .06 .04

[INCIDENT_POSITION_XY_DEPOSIT]
PATH = incident_position_xy_of_deposit_particle.png
CANVAS_SIZE = 2000 1000
TITLE = "Incident position of deposit their energy; Column; Row"
REBIN = 8 8 

[INCIDENT_POSITION_Z_DEPOSIT]
PATH = incident_position_z_of_deposit_particle.png
CANVAS_SIZE = 1000 1000
TITLE = "Incident position (Z) of deposit their energy; Position; Entry"

[ENERGY_DEPOSIT]
PATH = energy_deposit.png
